name: Build and deploy to Azure Web App

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: dp-flight-tracker

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package source for App Service (Oryx will install + build)
        run: |
          zip -r deploy.zip . \
            -x '.git/*' \
               '.github/*' \
               'node_modules/*' \
               '*/node_modules/*' \
               'client/dist/*' \
               'server/dist/*' \
               '*.tsbuildinfo' \
               '.env' '.env.local'

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip
